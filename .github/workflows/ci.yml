# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    name: Web build & checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Detect package manager
        id: pm
        shell: bash
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "pm=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then
            echo "pm=yarn" >> "$GITHUB_OUTPUT"
          else
            echo "pm=npm" >> "$GITHUB_OUTPUT"
          fi
          echo "Detected package manager: ${{ steps.pm.outputs.pm }}"

      - name: Setup pnpm (if used)
        if: steps.pm.outputs.pm == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Enable Corepack (yarn)
        if: steps.pm.outputs.pm == 'yarn'
        shell: bash
        run: corepack enable

      - name: Install dependencies
        shell: bash
        run: |
          if [ "${{ steps.pm.outputs.pm }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile
          elif [ "${{ steps.pm.outputs.pm }}" = "yarn" ]; then
            (yarn install --immutable) || (yarn install --frozen-lockfile) || yarn install
          else
            npm ci
          fi

      - name: Lint (if script exists)
        shell: bash
        run: |
          has_script() {
            node -e "const s=require('./package.json').scripts||{}; process.exit(s['lint']?0:1)"
          }

          if has_script; then
            if [ "${{ steps.pm.outputs.pm }}" = "pnpm" ]; then
              pnpm lint
            elif [ "${{ steps.pm.outputs.pm }}" = "yarn" ]; then
              yarn lint
            else
              npm run lint
            fi
          else
            echo "No lint script; skipping."
          fi

      - name: Typecheck (if script exists)
        shell: bash
        run: |
          has_script() {
            node -e "const s=require('./package.json').scripts||{}; process.exit(s['typecheck']?0:1)"
          }

          if has_script; then
            if [ "${{ steps.pm.outputs.pm }}" = "pnpm" ]; then
              pnpm typecheck
            elif [ "${{ steps.pm.outputs.pm }}" = "yarn" ]; then
              yarn typecheck
            else
              npm run typecheck
            fi
          else
            echo "No typecheck script; skipping."
          fi

      - name: Unit or component tests (if script exists)
        env:
          CI: "true"
        shell: bash
        run: |
          has_script() {
            node -e "const s=require('./package.json').scripts||{}; process.exit(s['test']?0:1)"
          }

          if has_script; then
            if [ "${{ steps.pm.outputs.pm }}" = "pnpm" ]; then
              pnpm test -- --run
            elif [ "${{ steps.pm.outputs.pm }}" = "yarn" ]; then
              yarn test --run
            else
              npm test -- --run
            fi
          else
            echo "No test script; skipping."
          fi

      - name: Build
        shell: bash
        run: |
          if [ "${{ steps.pm.outputs.pm }}" = "pnpm" ]; then
            pnpm build
          elif [ "${{ steps.pm.outputs.pm }}" = "yarn" ]; then
            yarn build
          else
            npm run build
          fi

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/**
          if-no-files-found: error